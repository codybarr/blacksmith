name: Release from tag

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build release artifacts
        run: bun run build:all

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          cp dist/zed/blacksmith.json release-assets/blacksmith-zed.json
          cp dist/warp/blacksmith.yaml release-assets/blacksmith-warp.yaml
          cp dist/lazygit/blacksmith.yml release-assets/blacksmith-lazygit.yml
          cp dist/pi/blacksmith.json release-assets/blacksmith-pi.json

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/blacksmith-zed.json
            release-assets/blacksmith-warp.yaml
            release-assets/blacksmith-lazygit.yml
            release-assets/blacksmith-pi.json
